<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سنة من الحب - دعاء وأحمد</title>
    <style>
        body { margin: 0; background: black; color: #0f0; font-family: 'Arial', sans-serif; overflow: hidden; text-align: center; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: -1; }
        #content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; }
        .countdown { font-size: 80px; font-weight: bold; text-shadow: 0 0 20px #0f0; }
        .message { display: none; font-size: 24px; line-height: 1.6; background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 15px; border: 1px solid #0f0; box-shadow: 0 0 30px #0f0; direction: rtl; }
        h1 { font-size: 40px; color: #fff; text-shadow: 0 0 10px #f00; margin-bottom: 10px; }
        .heart { color: #f00; font-size: 30px; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div id="content">
        <div id="count" class="countdown">3</div>
        <div id="wish" class="message">
            <h1>HAPPY BIRTHDAY <br> دعاء ❤️ أحمد</h1>
            <p>مرت سنة كاملة على حبنا.. <br> عشناها مع بعض بـ "الحلوة والمرة" <br> كنتِ فيها السند والروح، وكل شيء جميل في حياتي.</p>
            <p>كل عام وأنتِ بقلبي، وكل عام وإحنا سوا لآخر العمر.</p>
            <div class="heart">❤️❤️❤️</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "DOAA AHMED 2025 2026 LOVE ❤️";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        let timer = 3;
        const countEl = document.getElementById('count');
        const wishEl = document.getElementById('wish');
        const countdownInterval = setInterval(() => {
            timer--;
            if (timer > 0) {
                countEl.innerText = timer;
            } else {
                clearInterval(countdownInterval);
                countEl.style.display = 'none';
                wishEl.style.display = 'block';
            }
        }, 1000);
    </script>
</body>
</html>
