<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سنة من الحب - دعاء وأحمد</title>
    <style>
        body { margin: 0; background: black; color: #0f0; font-family: 'Arial', sans-serif; overflow: hidden; text-align: center; cursor: pointer; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: -1; }
        #content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; }
        .countdown { font-size: 80px; font-weight: bold; text-shadow: 0 0 20px #0f0; }
        .message { display: none; font-size: 22px; line-height: 1.6; background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 20px; border: 2px solid #0f0; box-shadow: 0 0 30px #0f0; direction: rtl; color: #fff; }
        h1 { font-size: 35px; color: #0f0; text-shadow: 0 0 10px #0f0; margin-bottom: 15px; }
        .heart { color: #f00; font-size: 40px; margin-top: 15px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: flex; justify-content: center; align-items: center; color: white; font-size: 20px; }
    </style>
</head>
<body>
    <div id="overlay">اضغط هنا لبدء المفاجأة ❤️</div>
    <canvas id="matrix"></canvas>
    <div id="content">
        <div id="count" class="countdown" style="display:none;">3</div>
        <div id="wish" class="message">
            <h1>HAPPY BIRTHDAY <br> دعاء ❤️ أحمد</h1>
            <p>مرت سنة كاملة على حبنا..</p>
            <p>عشناها مع بعض بـ "الحلوة والمرة"، كنتِ فيها السند والروح، وكل شيء جميل في حياتي.</p>
            <p>كل عام وأنتِ بقلبي، وكل عام وإحنا سوا لآخر العمر.</p>
            <div class="heart">❤️</div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const audio = document.getElementById('bgMusic');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "DOAA AHMED LOVE ❤️ 2026";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            audio.play();
            startCountdown();
        });

        function startCountdown() {
            let timer = 3;
            const countEl = document.getElementById('count');
            const wishEl = document.getElementById('wish');
            countEl.style.display = 'block';
            
            const countdownInterval = setInterval(() => {
                timer--;
                if (timer > 0) {
                    countEl.innerText = timer;
                } else {
                    clearInterval(countdownInterval);
                    countEl.style.display = 'none';
                    wishEl.style.display = 'block';
                }
            }, 1000);
        }
    </script>
</body>
</html>
